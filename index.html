<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contador de Dinheiro</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}body{margin:0;background:#050505;color:#fff;padding:16px}
.container{max-width:900px;margin:auto}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:16px}
.card{border:4px solid;border-radius:18px;padding:12px;text-align:center}.value{font-size:48px;font-weight:bold}.count{font-size:34px;background:#111;border-radius:10px;padding:8px;margin:8px auto;width:80px}
button{width:70px;height:46px;border:none;border-radius:10px;font-size:24px;font-weight:bold;cursor:pointer}
.yellow{border-color:#ffd21f;color:#ffd21f}.yellow button{background:#ffd21f}.cyan{border-color:#29e8ff;color:#29e8ff}.cyan button{background:#29e8ff}
.red{border-color:#ff4a4a;color:#ff4a4a}.red button{background:#ff4a4a;color:#fff}.purple{border-color:#df4cff;color:#df4cff}.purple button{background:#df4cff}.blue{border-color:#3f7bff;color:#3f7bff}.blue button{background:#3f7bff;color:#fff}
.moedas,.total{text-align:center;margin-top:28px}.moedas input{font-size:28px;padding:10px;width:220px;text-align:center;background:#111;color:#fff;border:2px solid #555;border-radius:10px}.total{border:4px solid #2fd64b;border-radius:18px;padding:16px}.total h2{color:#2fd64b}.total div{font-size:56px;font-weight:bold}
#reset{margin-top:16px;background:#666;color:#fff;padding:10px 18px}
@media(max-width:700px){.grid4{grid-template-columns:repeat(2,1fr)}.total div{font-size:40px}}
</style></head><body><div class="container">
<div class="grid2" id="top"></div><div class="grid4" id="bottom"></div>
<div class="moedas"><h2>MOEDAS</h2><input id="coins" type="number" step="0.01" min="0" placeholder="0,00"></div>
<div class="total"><h2>TOTAL</h2><div id="total"></div></div>
<div style="text-align:center"><button id="reset">Zerar Tudo</button></div>
</div>
<script>
const denomsTop=[50,100],denomsBottom=[20,10,5,2];
const cls={50:"yellow",100:"cyan",20:"yellow",10:"red",5:"purple",2:"blue"};
const counts={100:0,50:0,20:0,10:0,5:0,2:0}; const KEY="contadorDinheiro";
function card(v){return `<div class="card ${cls[v]}"><div class=value>${v}</div><button data-v="${v}" data-d="1">▲</button><div class=count id="c${v}">0</div><button data-v="${v}" data-d="-1">▼</button></div>`}
top.innerHTML=denomsTop.map(card).join(""); bottom.innerHTML=denomsBottom.map(card).join("");
function save(){localStorage.setItem(KEY,JSON.stringify({counts:counts,coins:coins.value}))}
function load(){let s=localStorage.getItem(KEY);if(!s)return;try{let d=JSON.parse(s);Object.keys(counts).forEach(k=>{if(d.counts&&d.counts[k]!=null){counts[k]=d.counts[k];document.getElementById("c"+k).textContent=counts[k]}});if(d.coins!=null)coins.value=d.coins;}catch(e){}}
function update(){let t=0;for(let k in counts)t+=counts[k]*Number(k);let c=parseFloat((coins.value||"0").replace(",", "."));if(!isNaN(c))t+=c;total.textContent=t.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});save()}
document.body.addEventListener("click",e=>{if(e.target.dataset.v){let v=e.target.dataset.v,d=Number(e.target.dataset.d);counts[v]=Math.max(0,counts[v]+d);document.getElementById("c"+v).textContent=counts[v];update()}});
coins.oninput=update;
reset.onclick=()=>{if(confirm("Zerar todos os valores?")){Object.keys(counts).forEach(k=>{counts[k]=0;document.getElementById("c"+k).textContent=0});coins.value="";update();localStorage.removeItem(KEY)}}
load();update();
</script></body></html>
