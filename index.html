<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contador de Dinheiro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#050505;
    color:white;
    padding:18px;
}

.container{
    max-width:900px;
    margin:auto;
}

.grid-top{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
    margin-bottom:18px;
}

.grid-bottom{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:18px;
}

.card{
    border:4px solid;
    border-radius:18px;
    padding:16px;
    text-align:center;
}

.value{
    font-size:60px;
    font-weight:bold;
    margin-bottom:18px;
}

.counter{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
}

.btn{
    width:70px;
    height:52px;
    border:none;
    border-radius:12px;
    font-size:28px;
    font-weight:bold;
    cursor:pointer;
    color:white;
}

.count{
    width:90px;
    background:#111;
    border:2px solid #333;
    border-radius:10px;
    padding:12px;
    font-size:34px;
}

.yellow{border-color:#FFD21F;color:#FFD21F;}
.yellow .btn{background:#FFD21F;color:#111;}

.cyan{border-color:#28E8FF;color:#28E8FF;}
.cyan .btn{background:#28E8FF;color:#111;}

.red{border-color:#FF3B3B;color:#FF3B3B;}
.red .btn{background:#FF3B3B;}

.purple{border-color:#E83EFF;color:#E83EFF;}
.purple .btn{background:#E83EFF;}

.blue{border-color:#2F6FFF;color:#2F6FFF;}
.blue .btn{background:#2F6FFF;}

.moedas{
    margin-top:35px;
    text-align:center;
}

.moedas h2{
    margin-bottom:20px;
    font-size:38px;
}

.moeda-box{
    display:flex;
    justify-content:center;
    gap:20px;
    align-items:center;
}

.moeda-input{
    width:220px;
    padding:15px;
    font-size:34px;
    text-align:center;
    background:#111;
    color:white;
    border:2px solid #555;
    border-radius:12px;
}

.total{
    margin-top:40px;
    border:4px solid #31d843;
    border-radius:20px;
    text-align:center;
    padding:20px;
}

.total h2{
    color:#31d843;
    font-size:44px;
}

#total{
    margin-top:10px;
    font-size:72px;
    font-weight:bold;
}

@media(max-width:700px){

.grid-bottom{
grid-template-columns:repeat(2,1fr);
}

.value{
font-size:52px;
}

#total{
font-size:54px;
}

}
</style>
</head>

<body>

<div class="container">

<div class="grid-top">

<div class="card yellow">
<div class="value">50</div>

<div class="counter">
<button class="btn" onclick="change(50,1)">▲</button>
<div class="count" id="c50">0</div>
<button class="btn" onclick="change(50,-1)">▼</button>
</div>

</div>

<div class="card cyan">
<div class="value">100</div>

<div class="counter">
<button class="btn" onclick="change(100,1)">▲</button>
<div class="count" id="c100">0</div>
<button class="btn" onclick="change(100,-1)">▼</button>
</div>

</div>

</div>


<div class="grid-bottom">

<div class="card yellow">
<div class="value">20</div>

<div class="counter">
<button class="btn" onclick="change(20,1)">▲</button>
<div class="count" id="c20">0</div>
<button class="btn" onclick="change(20,-1)">▼</button>
</div>

</div>

<div class="card red">
<div class="value">10</div>

<div class="counter">
<button class="btn" onclick="change(10,1)">▲</button>
<div class="count" id="c10">0</div>
<button class="btn" onclick="change(10,-1)">▼</button>
</div>

</div>

<div class="card purple">
<div class="value">5</div>

<div class="counter">
<button class="btn" onclick="change(5,1)">▲</button>
<div class="count" id="c5">0</div>
<button class="btn" onclick="change(5,-1)">▼</button>
</div>

</div>

<div class="card blue">
<div class="value">2</div>

<div class="counter">
<button class="btn" onclick="change(2,1)">▲</button>
<div class="count" id="c2">0</div>
<button class="btn" onclick="change(2,-1)">▼</button>
</div>

</div>

</div>


<div class="moedas">

<h2>MOEDAS</h2>

<div class="moeda-box">

<input
id="coins"
class="moeda-input"
type="number"
step="0.01"
min="0"
placeholder="0,00"
oninput="updateTotal()">

</div>

</div>


<div class="total">

<h2>TOTAL</h2>

<div id="total">
R$ 0,00
</div>

</div>

</div>

<script>

const counts={
100:0,
50:0,
20:0,
10:0,
5:0,
2:0
};

function change(value,delta){

counts[value]+=delta;

if(counts[value]<0)
counts[value]=0;

document.getElementById("c"+value).textContent=counts[value];

updateTotal();

}

function updateTotal(){

let total=0;

for(let v in counts){

total+=counts[v]*Number(v);

}

let moedas=parseFloat(document.getElementById("coins").value);

if(!isNaN(moedas))
total+=moedas;

document.getElementById("total").textContent=
total.toLocaleString("pt-BR",{
style:"currency",
currency:"BRL"
});

}

updateTotal();

</script>

</body>
</html>
