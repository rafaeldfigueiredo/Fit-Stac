<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Contador de Dinheiro</title>

    <style>
      /* ===========================
   RESET
=========================== */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #050505;
    color: white;
    font-family: Arial, Helvetica, sans-serif;
    padding: 20px;
}

/* ===========================
   CONTAINER
=========================== */

.container {
    max-width: 900px;
    margin: auto;
}

header {
    text-align: center;
    margin-bottom: 30px;
}

header h1 {
    font-size: 2rem;
    font-weight: bold;
}

/* ===========================
   GRIDS
=========================== */

.top-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    margin-bottom: 20px;
}

.bottom-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
}

/* ===========================
   MONEY CARD
=========================== */

.money-card {

    border: 4px solid;

    border-radius: 18px;

    padding: 18px;

    text-align: center;

    background: #101010;

    transition: .15s;
}

.money-card:hover {
    transform: scale(1.02);
}

.money-value {

    font-size: 2rem;

    font-weight: bold;

    margin-bottom: 20px;
}

.counter-display {

    width: 90px;

    margin: 10px auto;

    padding: 12px;

    background: #181818;

    border: 2px solid #333;

    border-radius: 12px;

    font-size: 2rem;

    font-weight: bold;
}

.counter-btn {

    width: 70px;

    height: 52px;

    border: none;

    border-radius: 12px;

    cursor: pointer;

    font-size: 1.5rem;

    font-weight: bold;

    transition: .15s;
}

.counter-btn:hover {
    transform: scale(1.08);
}

.counter-btn:active {
    transform: scale(.95);
}

/* ===========================
   COLORS
=========================== */

.yellow {

    border-color: #FFD633;

    color: #FFD633;
}

.yellow button {

    background: #FFD633;

    color: black;
}

.cyan {

    border-color: #34E6FF;

    color: #34E6FF;
}

.cyan button {

    background: #34E6FF;

    color: black;
}

.red {

    border-color: #FF4444;

    color: #FF4444;
}

.red button {

    background: #FF4444;

    color: white;
}

.purple {

    border-color: #C84DFF;

    color: #C84DFF;
}

.purple button {

    background: #C84DFF;

    color: white;
}

.blue {

    border-color: #4A82FF;

    color: #4A82FF;
}

.blue button {

    background: #4A82FF;

    color: white;
}

/* ===========================
   COINS
=========================== */

.coins-section {

    margin-top: 35px;

    text-align: center;
}

.coins-section h2 {

    margin-bottom: 15px;
}

#coins {

    width: 220px;

    padding: 12px;

    border-radius: 12px;

    border: 2px solid #555;

    background: #111;

    color: white;

    font-size: 1.6rem;

    text-align: center;
}

/* ===========================
   TOTAL
=========================== */

.total-section {

    margin-top: 35px;

    text-align: center;

    border: 4px solid #39d353;

    border-radius: 18px;

    padding: 20px;
}

.total-section h2 {

    color: #39d353;

    margin-bottom: 12px;

    font-size: 2rem;
}

#grandTotal {

    font-size: 3.5rem;

    font-weight: bold;
}

/* ===========================
   BUTTONS
=========================== */

.actions {

    text-align: center;

    margin-top: 30px;
}

#resetButton {

    background: #ff4444;

    color: white;

    border: none;

    border-radius: 12px;

    padding: 15px 30px;

    font-size: 1.1rem;

    font-weight: bold;

    cursor: pointer;

    transition: .15s;
}

#resetButton:hover {

    transform: scale(1.05);
}

#resetButton:active {

    transform: scale(.95);
}

/* ===========================
   RESPONSIVO
=========================== */

@media (max-width: 700px) {

    .bottom-grid {

        grid-template-columns: repeat(2, 1fr);
    }

    .money-value {

        font-size: 1.6rem;
    }

    .counter-display {

        width: 75px;

        font-size: 1.6rem;
    }

    .counter-btn {

        width: 60px;

        height: 45px;
    }

    #grandTotal {

        font-size: 2.5rem;
    }

    #coins {

        width: 180px;
    }

      }
    </style>
</head>

<body>

<div class="container">

    <header>
        <h1>💵 Contador de Dinheiro</h1>
    </header>

    <!-- Linha Superior -->
    <section class="top-grid">

        <div class="money-card yellow">

            <div class="money-value">
                R$100
            </div>

            <button
                class="counter-btn plus"
                data-value="100">
                ▲
            </button>

            <div
                class="counter-display"
                id="count100">
                0
            </div>

            <button
                class="counter-btn minus"
                data-value="100">
                ▼
            </button>

        </div>

        <div class="money-card cyan">

            <div class="money-value">
                R$50
            </div>

            <button
                class="counter-btn plus"
                data-value="50">
                ▲
            </button>

            <div
                class="counter-display"
                id="count50">
                0
            </div>

            <button
                class="counter-btn minus"
                data-value="50">
                ▼
            </button>

        </div>

    </section>

    <!-- Linha Inferior -->

    <section class="bottom-grid">

        <div class="money-card yellow">

            <div class="money-value">
                R$20
            </div>

            <button
                class="counter-btn plus"
                data-value="20">
                ▲
            </button>

            <div
                class="counter-display"
                id="count20">
                0
            </div>

            <button
                class="counter-btn minus"
                data-value="20">
                ▼
            </button>

        </div>


        <div class="money-card red">

            <div class="money-value">
                R$10
            </div>

            <button
                class="counter-btn plus"
                data-value="10">
                ▲
            </button>

            <div
                class="counter-display"
                id="count10">
                0
            </div>

            <button
                class="counter-btn minus"
                data-value="10">
                ▼
            </button>

        </div>


        <div class="money-card purple">

            <div class="money-value">
                R$5
            </div>

            <button
                class="counter-btn plus"
                data-value="5">
                ▲
            </button>

            <div
                class="counter-display"
                id="count5">
                0
            </div>

            <button
                class="counter-btn minus"
                data-value="5">
                ▼
            </button>

        </div>


        <div class="money-card blue">

            <div class="money-value">
                R$2
            </div>

            <button
                class="counter-btn plus"
                data-value="2">
                ▲
            </button>

            <div
                class="counter-display"
                id="count2">
                0
            </div>

            <button
                class="counter-btn minus"
                data-value="2">
                ▼
            </button>

        </div>

    </section>

    <!-- Moedas -->

    <section class="coins-section">

        <h2>
            🪙 Moedas
        </h2>

        <input
            type="number"
            id="coins"
            min="0"
            step="0.01"
            placeholder="0,00">

    </section>

    <!-- Total -->

    <section class="total-section">

        <h2>Total</h2>

        <div id="grandTotal">
            R$ 0,00
        </div>

    </section>

    <!-- Botões -->

    <section class="actions">

        <button
            id="resetButton">
            Zerar Tudo
        </button>

    </section>

</div>

<script>
// =========================
// CONFIGURAÇÃO
// =========================

const STORAGE_KEY = "contadorDinheiro";

const notes = {
    100: 0,
    50: 0,
    20: 0,
    10: 0,
    5: 0,
    2: 0
};

let repeatInterval = null;


// =========================
// ELEMENTOS
// =========================

const coinInput = document.getElementById("coins");
const totalDisplay = document.getElementById("grandTotal");
const resetButton = document.getElementById("resetButton");


// =========================
// LOCAL STORAGE
// =========================

function saveData() {

    const data = {

        notes: notes,

        coins: coinInput.value

    };

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(data)
    );

}

function loadData() {

    const saved = localStorage.getItem(STORAGE_KEY);

    if (!saved)
        return;

    try {

        const data = JSON.parse(saved);

        if (data.notes) {

            for (const value in notes) {

                if (data.notes[value] != null) {

                    notes[value] = data.notes[value];

                }

            }

        }

        if (data.coins != null) {

            coinInput.value = data.coins;

        }

    }

    catch (e) {

        console.error(e);

    }

}


// =========================
// ATUALIZA TELA
// =========================

function refreshCounters() {

    for (const value in notes) {

        document.getElementById(
            "count" + value
        ).textContent = notes[value];

    }

}

function updateTotal() {

    let total = 0;

    for (const value in notes) {

        total += Number(value) * notes[value];

    }

    let moedas = parseFloat(
        coinInput.value.replace(",", ".")
    );

    if (isNaN(moedas))
        moedas = 0;

    total += moedas;

    totalDisplay.textContent =
        total.toLocaleString(
            "pt-BR",
            {
                style: "currency",
                currency: "BRL"
            }
        );

    saveData();

}


// =========================
// CONTADORES
// =========================

function change(value, delta) {

    notes[value] += delta;

    if (notes[value] < 0)
        notes[value] = 0;

    refreshCounters();

    updateTotal();

    vibrate();

}


// =========================
// VIBRAÇÃO
// =========================

function vibrate() {

    if (navigator.vibrate) {

        navigator.vibrate(20);

    }

}


// =========================
// SEGURAR BOTÃO
// =========================

function startRepeat(value, delta) {

    change(value, delta);

    clearInterval(repeatInterval);

    repeatInterval = setInterval(() => {

        change(value, delta);

    }, 120);

}

function stopRepeat() {

    clearInterval(repeatInterval);

}


// =========================
// EVENTOS DOS BOTÕES
// =========================

document
.querySelectorAll(".plus")
.forEach(button => {

    const value = Number(button.dataset.value);

    button.addEventListener(
        "mousedown",
        () => startRepeat(value, 1)
    );

    button.addEventListener(
        "touchstart",
        e => {

            e.preventDefault();

            startRepeat(value, 1);

        }
    );

});

document
.querySelectorAll(".minus")
.forEach(button => {

    const value = Number(button.dataset.value);

    button.addEventListener(
        "mousedown",
        () => startRepeat(value, -1)
    );

    button.addEventListener(
        "touchstart",
        e => {

            e.preventDefault();

            startRepeat(value, -1);

        }
    );

});

[
"mouseup",
"mouseleave",
"touchend",
"touchcancel"
].forEach(event => {

    document.addEventListener(
        event,
        stopRepeat
    );

});


// =========================
// MOEDAS
// =========================

coinInput.addEventListener(
    "input",
    updateTotal
);


// =========================
// RESET
// =========================

resetButton.addEventListener(
    "click",
    () => {

        if (!confirm(
            "Deseja realmente zerar toda a contagem?"
        )) {

            return;

        }

        for (const value in notes) {

            notes[value] = 0;

        }

        coinInput.value = "";

        refreshCounters();

        updateTotal();

        localStorage.removeItem(
            STORAGE_KEY
        );

    }
);


// =========================
// INICIALIZAÇÃO
// =========================

loadData();

refreshCounters();

updateTotal();
</script>

</body>

</html>
